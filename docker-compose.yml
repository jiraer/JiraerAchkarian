version: '3.9'
  
  services:
    mongo:
      image: mongo:7
      container_name: portfolio-mongo
      restart: always
      ports:
        - '27017:27017'
      volumes:
        - mongo-data:/data/db
  
    backend:
      build:
        context: .
        dockerfile: Dockerfile.backend
      container_name: portfolio-backend
      restart: always
      env_file:
        - apps/backend/.env.example
      environment:
        - MONGODB_URI=mongodb://mongo:27017/portfolio
        - CORS_ORIGIN=http://localhost:3000
      ports:
        - '4000:4000'
      depends_on:
        - mongo
  
    frontend:
      build:
        context: .
        dockerfile: Dockerfile.frontend
      container_name: portfolio-frontend
      restart: always
      env_file:
        - apps/frontend/.env.example
      environment:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
      ports:
        - '3000:3000'
      depends_on:
        - backend
  
  volumes:
    mongo-data:
  